services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: blogbackend
      POSTGRES_USER: bloguser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bloguser -d blogbackend"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: BlogBackend.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=db;Database=blogbackend;Username=bloguser;Password=${POSTGRES_PASSWORD}"
      JWT__SigningKey: ${JWT_SIGNING_KEY}
      JWT__Issuer: ${JWT_ISSUER}
      JWT__Audience: ${JWT_AUDIENCE}
    depends_on:
      db:
        condition: service_healthy

  mailhog:
    image: mailhog/mailhog
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  pgdata:
