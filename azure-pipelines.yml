trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: blog-cv-secrets
  - name: NODE_VERSION
    value: '22'

stages:
  - stage: CI
    displayName: 'Continuous Integration'
    jobs:
      - job: Validate
        displayName: 'Typecheck + Build'
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)
            displayName: 'Setup Node.js $(NODE_VERSION)'

          - script: npm install -g pnpm
            displayName: 'Install pnpm'

          - script: pnpm install --frozen-lockfile
            displayName: 'Install dependencies'

          # TypeScript + Astro check — falla si hay errores de tipos
          - script: pnpm astro check
            displayName: 'Astro typecheck'

          # Build de verificación — confirma que el código compila sin errores
          # Vercel hace su propio build al deployar, pero este falla antes y
          # tiene logs más claros para el desarrollador
          - script: pnpm build
            displayName: 'Build verification'
            env:
              TURSO_URL: $(TURSO_URL)
              TURSO_TOKEN: $(TURSO_TOKEN)

          - task: PublishBuildArtifacts@1
            inputs:
              PathtoPublish: 'dist'
              ArtifactName: 'build-output'
            displayName: 'Publish artifacts'
            condition: succeeded()
